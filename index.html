<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaStream - Minimal Video Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlack: '#050505',
                        brandGray: '#121212',
                        brandRed: '#e50914'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #f3f4f6;
        }
        /* カスタムシークバー用のリセット */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: #2b2b2b;
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -6px;
            background-color: #e50914;
            height: 16px;
            width: 16px;
            border-radius: 50%;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-red-600 selection:text-white">

    <!-- メインコンテンツ（ヘッダーなし：美しいシアターレイアウト） -->
    <div class="max-w-6xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 flex-grow">
        
        <!-- 左側：メインビデオプレイヤー ＆ 操作部分 -->
        <main class="lg:col-span-2 space-y-6">
            
            <!-- ビデオプレイヤー（カスタムシネマコントロール） -->
            <div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-neutral-900 group">
                <video id="mainPlayer" class="w-full h-full object-contain" playsinline>
                    <source id="playerSource" src="https://uncertain-sapphire-c9yqbkta.edgeone.dev/22810.mp4" type="video/mp4">
                </video>
                
                <!-- ビデオコントロールUI（マウスホバー時またはタップ時に表示） -->
                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent p-5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col gap-3">
                    <!-- シークバー -->
                    <div class="flex items-center gap-3">
                        <span id="currentTime" class="text-xs text-neutral-400 font-mono">00:00</span>
                        <input type="range" id="seekBar" class="w-full h-1 bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-red-600" value="0" max="100">
                        <span id="duration" class="text-xs text-neutral-400 font-mono">00:00</span>
                    </div>
                    
                    <!-- コントロールボタン -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-5">
                            <!-- 再生 / 一時停止 -->
                            <button id="playBtn" class="text-white hover:text-red-500 transition-colors">
                                <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                            </button>
                            <!-- 音量設定 -->
                            <div class="flex items-center gap-2">
                                <button id="muteBtn" class="text-white hover:text-neutral-300 transition-colors">
                                    <i data-lucide="volume-2" class="w-5 h-5"></i>
                                </button>
                                <input type="range" id="volumeBar" class="w-16 h-1 bg-neutral-700 rounded-lg accent-white" value="100" max="100">
                            </div>
                        </div>

                        <!-- 右側：全画面表示 -->
                        <div class="flex items-center gap-4">
                            <button id="fullscreenBtn" class="text-white hover:text-red-500 transition-colors" title="全画面">
                                <i data-lucide="maximize" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 読み込みスピナー -->
                <div id="videoSpinner" class="absolute inset-0 bg-black/50 flex items-center justify-center pointer-events-none hidden">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-red-600 border-t-transparent"></div>
                </div>
            </div>

            <!-- 動画情報とアクション -->
            <div class="bg-brandGray p-6 rounded-3xl border border-neutral-900 space-y-4 shadow-xl">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="space-y-1">
                        <h1 id="videoTitle" class="text-xl lg:text-2xl font-black tracking-tight leading-tight text-white">
                            読み込み中...
                        </h1>
                        <p class="text-xs text-neutral-500" id="videoDate">公開日: ----/--/--</p>
                    </div>

                    <!-- 共有・ダウンロード（添付画像と同様のブラウザネイティブ呼び出し） -->
                    <div class="flex items-center gap-3">
                        <!-- 共有ボタン -->
                        <button onclick="shareVideo()" class="flex items-center gap-2 px-5 py-3 bg-neutral-800 hover:bg-neutral-700 active:scale-95 transition-all rounded-full text-xs font-bold text-gray-200 shadow-md">
                            <i data-lucide="share-2" class="w-4 h-4 text-blue-400"></i>
                            <span>共有する</span>
                        </button>

                        <!-- ダウンロードボタン（ネイティブバー連動） -->
                        <button id="downloadBtn" onclick="downloadVideo()" class="flex items-center gap-2 px-5 py-3 bg-neutral-800 hover:bg-neutral-700 active:scale-95 transition-all rounded-full text-xs font-bold text-gray-200 shadow-md">
                            <i data-lucide="download" class="w-4 h-4 text-green-400"></i>
                            <span id="downloadBtnText">ダウンロード</span>
                        </button>
                    </div>
                </div>

                <!-- 動画詳細 -->
                <div class="p-4 bg-black rounded-2xl text-sm leading-relaxed text-neutral-400 border border-neutral-900">
                    <p id="videoDesc" class="whitespace-pre-line text-xs lg:text-sm text-neutral-400">
                        動画情報をロード中...
                    </p>
                </div>
            </div>
        </main>

        <!-- 右側：プレイリスト（他の動画一覧） -->
        <aside class="space-y-4">
            <h2 class="text-xs font-black text-neutral-500 flex items-center gap-2 px-1 tracking-wider uppercase">
                <i data-lucide="play-circle" class="w-4 h-4 text-red-500 animate-pulse"></i>
                <span>プレイリスト</span>
            </h2>

            <!-- おすすめ動画リスト -->
            <div id="playlist" class="space-y-3">
                <!-- JavaScriptで描画されます -->
            </div>
        </aside>
    </div>

    <!-- ダウンロード用のフォールバック案内（CORSなどのセキュリティ例外用） -->
    <div id="downloadModal" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 hidden">
        <div class="bg-neutral-900 border border-neutral-800 rounded-2xl max-w-md w-full p-6 space-y-4 shadow-2xl">
            <div class="flex justify-between items-start">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <i data-lucide="info" class="text-blue-400"></i>
                    <span>ダウンロード方法</span>
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <p class="text-sm text-neutral-300 leading-relaxed">
                ブラウザのセキュリティ設定により、直接ダウンロードがブロックされました。以下の手順で確実に保存できます：
            </p>
            <div class="p-3.5 bg-black rounded-xl text-xs text-neutral-400 space-y-2">
                <ol class="list-decimal list-inside space-y-1.5">
                    <li>「動画ファイルを開く」をクリックします。</li>
                    <li>動画画面を<span class="text-red-400 font-bold">長押し</span>または<span class="text-red-400 font-bold">右クリック</span>します。</li>
                    <li>「<span class="text-white font-bold">名前を付けて動画を保存</span>」を選んで完了です！</li>
                </ol>
            </div>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="w-1/2 py-3 bg-neutral-800 text-white rounded-xl text-xs font-bold hover:bg-neutral-700 transition-colors">
                    閉じる
                </button>
                <a id="modalDownloadLink" href="#" target="_blank" class="w-1/2 py-3 bg-red-600 text-white rounded-xl text-xs font-bold hover:bg-red-500 transition-colors text-center flex items-center justify-center gap-1">
                    <span>動画ファイルを開く</span>
                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- フッター -->
    <footer class="bg-black border-t border-neutral-950 py-6 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center space-y-1">
            <p class="text-xs text-gray-600">&copy; 2026 StreamView. Premium Cinema Experience.</p>
        </div>
    </footer>

    <!-- 通知（トースト） -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-10 opacity-0 pointer-events-none transition-all duration-300 bg-neutral-900 border border-neutral-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3">
        <div class="bg-red-600/10 text-red-500 p-1 rounded-md">
            <i data-lucide="bell" class="w-4 h-4"></i>
        </div>
        <span id="toastMsg" class="text-xs font-bold">通知メッセージ</span>
    </div>

    <!-- スクリプト -->
    <script>
        // 動画データベース（すべての動画に個別サムネイルをマッピング）
        const videos = [
            {
                id: 1,
                title: "Beautiful Looping City Street Life (Recommended Video 1)",
                url: "https://uncertain-sapphire-c9yqbkta.edgeone.dev/22810.mp4",
                thumbnail: "https://cdn.phototourl.com/free/2026-06-29-6145d12b-277d-489b-baac-e66a1835a9be.jpg", // 1つ目のサムネイル
                duration: "0:15",
                date: "2026/06/29",
                desc: "1つ目のビデオクリップ。美しい都会の通りと、そこに流れる穏やかな時間のシネマティックループ。"
            },
            {
                id: 2,
                title: "Na-Na-Ni Motion Concept HD Video (Recommended Video 2)",
                url: "https://conventional-indigo-13nr34rd.edgeone.dev/na-na-ni--ha-me_1080p.mp4",
                thumbnail: "https://cdn.phototourl.com/free/2026-06-29-b5712154-6f49-47b7-b207-6f5c5562f76a.jpg", // 真ん中のサムネイル
                duration: "0:24",
                date: "2026/06/25",
                desc: "2つ目のアニメーション。スピード感あるラインが交錯するクリエイティブモーショングラフィックスです。"
            },
            {
                id: 3,
                title: "Default Platform Showcase Premium Video (Recommended Video 3)",
                url: "https://www.image2url.com/r2/default/videos/1782740560252-5f3262f5-3764-4a12-bb39-e4ca8a96eca5.mp4",
                thumbnail: "https://cdn.phototourl.com/free/2026-06-29-7cb9c5f8-d513-485a-b394-c46f8d68f273.jpg", // 一番下のサムネイル
                duration: "0:09",
                date: "2026/06/29",
                desc: "3つ目のショーケース動画。高解像度の澄んだ映像表現を存分にお楽しみいただけます。"
            }
        ];

        let activeId = 1;

        // DOM参照
        const player = document.getElementById("mainPlayer");
        const playerSrc = document.getElementById("playerSource");
        const vTitle = document.getElementById("videoTitle");
        const vDate = document.getElementById("videoDate");
        const vDesc = document.getElementById("videoDesc");
        const playBtn = document.getElementById("playBtn");
        const muteBtn = document.getElementById("muteBtn");
        const seekBar = document.getElementById("seekBar");
        const volumeBar = document.getElementById("volumeBar");
        const durationText = document.getElementById("duration");
        const currentTimeText = document.getElementById("currentTime");
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const playlistContainer = document.getElementById("playlist");
        const videoSpinner = document.getElementById("videoSpinner");

        window.onload = function() {
            // URLパラメータによる初期読み込みに対応
            const params = new URLSearchParams(window.location.search);
            const vParam = parseInt(params.get('v'));
            
            if (vParam && videos.find(v => v.id === vParam)) {
                activeId = vParam;
            } else {
                activeId = 1;
            }

            loadVideo(activeId);
            renderPlaylist();
            lucide.createIcons();
            setupPlayerEventListeners();
        };

        // ビデオロード処理
        function loadVideo(id) {
            const v = videos.find(item => item.id === id);
            if (!v) return;

            activeId = id;
            playerSrc.src = v.url;
            player.load();

            vTitle.textContent = v.title;
            vDate.textContent = `公開日: ${v.date}`;
            vDesc.textContent = v.desc;

            renderPlaylist();
            videoSpinner.classList.remove("hidden");

            player.play().then(() => {
                playBtn.innerHTML = `<i data-lucide="pause" class="w-6 h-6 fill-current"></i>`;
                lucide.createIcons();
            }).catch(() => {
                playBtn.innerHTML = `<i data-lucide="play" class="w-6 h-6 fill-current"></i>`;
                lucide.createIcons();
            });
        }

        // Web Share API：OS標準共有メニュー
        async function shareVideo() {
            const basePageUrl = window.location.origin + window.location.pathname;
            const finalShareUrl = `${basePageUrl}?v=${activeId}`;
            const currentVideo = videos.find(item => item.id === activeId);

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: currentVideo.title,
                        text: "StreamViewでこの動画を見よう！",
                        url: finalShareUrl
                    });
                    showToast("📤 共有メニューを開きました");
                } catch (error) {
                    console.log("共有がキャンセルされました");
                }
            } else {
                const temp = document.createElement("input");
                temp.value = finalShareUrl;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand("copy");
                document.body.removeChild(temp);
                showToast("🔗 リンクをクリップボードにコピーしました！");
            }
        }

        // 💥 【重要】ブラウザのネイティブダウンロードを強制的に呼び出すダウンロード関数
        async function downloadVideo() {
            const v = videos.find(item => item.id === activeId);
            if (!v) return;

            const downloadBtn = document.getElementById("downloadBtn");
            const btnText = document.getElementById("downloadBtnText");
            
            // ボタンをローディング中＆進行率表示に変更
            downloadBtn.disabled = true;
            btnText.textContent = "準備中...";

            try {
                // ファイルデータをBlob（バイナリブロック）として取得開始
                const response = await fetch(v.url);
                if (!response.ok) throw new Error("Network Response Fail");
                
                // プログレス取得のためのリーダー構築
                const contentLength = +response.headers.get('Content-Length');
                const reader = response.body.getReader();
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    if (contentLength) {
                        const percent = Math.round((receivedLength / contentLength) * 100);
                        btnText.textContent = `${percent}%`;
                    }
                }

                // 結合してBlobオブジェクトを作成
                const blob = new Blob(chunks, { type: "video/mp4" });
                const blobUrl = URL.createObjectURL(blob);
                
                // 完全なダウンロード用アンカーを裏側で作成し、自動クリック
                const a = document.createElement("a");
                a.href = blobUrl;
                // 元のURLからファイル名を抽出（例: 22810.mp4）
                const fileName = v.url.substring(v.url.lastIndexOf('/') + 1) || `video_${activeId}.mp4`;
                a.download = fileName;
                document.body.appendChild(a);
                
                // クリックにより、ブラウザは「ローカルの完了ファイル」と認識し、
                // アップロード画像のような「ネイティブダウンロードバー」を即時にポップアップさせます。
                a.click();
                
                // 後処理
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
                
                showToast("✅ ダウンロードをブラウザで開始しました！");
            } catch (error) {
                // 万が一CORSポリシー等でfetchが拒否された場合のフォールバック案内
                console.warn("Blob download failed, showing fallback modal", error);
                openDownloadModal(v.url);
            } finally {
                // ボタンの表示をリセット
                downloadBtn.disabled = false;
                btnText.textContent = "ダウンロード";
            }
        }

        function openDownloadModal(url) {
            const modal = document.getElementById("downloadModal");
            const link = document.getElementById("modalDownloadLink");
            link.href = url;
            modal.classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("downloadModal").classList.add("hidden");
        }

        // プレイリスト一覧の描画
        function renderPlaylist() {
            playlistContainer.innerHTML = "";
            videos.forEach(v => {
                const isActive = v.id === activeId;
                const card = document.createElement("div");
                card.onclick = () => loadVideo(v.id);
                card.className = `group flex gap-3 p-3 rounded-2xl cursor-pointer transition-all border border-transparent ${
                    isActive ? "bg-neutral-900 border-neutral-800" : "bg-neutral-950/40 hover:bg-neutral-900"
                }`;

                // サムネイル画像の描画処理
                // bg-black（黒色背景）と object-contain を組み合わせて余分な部分を完全に黒色で満たします
                const thumbnailHtml = `<img class="absolute inset-0 w-full h-full object-contain bg-black transition-transform group-hover:scale-105 duration-300" src="${v.thumbnail}" alt="${v.title}">`;

                card.innerHTML = `
                    <div class="relative w-28 lg:w-32 h-16 bg-black rounded-xl overflow-hidden flex-shrink-0 border border-neutral-900">
                        ${thumbnailHtml}
                        <span class="absolute bottom-1 right-1 bg-black/80 text-[9px] px-1 rounded font-mono text-white z-10">${v.duration}</span>
                        ${isActive ? '<div class="absolute inset-0 bg-red-600/20 flex items-center justify-center z-20"><i data-lucide="play" class="w-5 h-5 text-red-500 fill-current"></i></div>' : ''}
                    </div>
                    <div class="flex flex-col justify-between py-0.5 min-w-0">
                        <h3 class="text-xs font-bold text-gray-200 leading-snug line-clamp-2 group-hover:text-red-500 transition-colors">
                            ${v.title}
                        </h3>
                        <p class="text-[10px] text-neutral-500">${v.date}</p>
                    </div>
                `;
                playlistContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        // トースト表示
        function showToast(msg) {
            const toast = document.getElementById("toast");
            const toastMsg = document.getElementById("toastMsg");
            toastMsg.textContent = msg;

            toast.classList.remove("translate-y-10", "opacity-0", "pointer-events-none");
            toast.classList.add("translate-y-0", "opacity-100");

            setTimeout(() => {
                toast.classList.remove("translate-y-0", "opacity-100");
                toast.classList.add("translate-y-10", "opacity-0", "pointer-events-none");
            }, 3500);
        }

        // ビデオコントロールの設定
        function setupPlayerEventListeners() {
            playBtn.onclick = togglePlay;
            player.onclick = togglePlay;

            player.oncanplay = () => videoSpinner.classList.add("hidden");
            player.onwaiting = () => videoSpinner.classList.remove("hidden");

            player.ontimeupdate = () => {
                if (!isNaN(player.duration)) {
                    const value = (player.currentTime / player.duration) * 100;
                    seekBar.value = value;
                    currentTimeText.textContent = formatTime(player.currentTime);
                }
            };

            player.onloadedmetadata = () => {
                durationText.textContent = formatTime(player.duration);
            };

            seekBar.oninput = () => {
                const time = (seekBar.value / 100) * player.duration;
                player.currentTime = time;
            };

            volumeBar.oninput = () => {
                player.volume = volumeBar.value / 100;
                player.muted = player.volume === 0;
                updateVolumeIcon();
            };

            muteBtn.onclick = () => {
                player.muted = !player.muted;
                updateVolumeIcon();
            };

            fullscreenBtn.onclick = () => {
                if (!document.fullscreenElement) {
                    player.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            };
        }

        // 再生／一時停止のトグル
        function togglePlay() {
            if (player.paused) {
                player.play();
                playBtn.innerHTML = `<i data-lucide="pause" class="w-6 h-6 fill-current"></i>`;
            } else {
                player.pause();
                playBtn.innerHTML = `<i data-lucide="play" class="w-6 h-6 fill-current"></i>`;
            }
            lucide.createIcons();
        }

        // 音量アイコンの切り替え
        function updateVolumeIcon() {
            if (player.muted || player.volume === 0) {
                muteBtn.innerHTML = `<i data-lucide="volume-x" class="w-5 h-5 text-red-500"></i>`;
            } else if (player.volume < 0.5) {
                muteBtn.innerHTML = `<i data-lucide="volume-1" class="w-5 h-5"></i>`;
            } else {
                muteBtn.innerHTML = `<i data-lucide="volume-2" class="w-5 h-5"></i>`;
            }
            lucide.createIcons();
        }

        // 時間フォーマット変換 (00:00)
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }
    </script>
</body>
</html>
